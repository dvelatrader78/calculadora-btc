<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="https://cryptologos.cc/logos/bitcoin-btc-logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adictos.shop | Binance & TEMU Hub</title>
    <style>
        :root {
            --bg: #050508;
            --gold: #ffcc00;
            --neon-electric-blue: #0055ff; 
            --temu-orange: #ff6600;
            --glass: rgba(15, 15, 25, 0.7);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 85% 20%, rgba(255, 102, 0, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 10% 80%, rgba(0, 85, 255, 0.08) 0%, transparent 40%),
                linear-gradient(135deg, #050508 0%, #12121f 100%);
            background-size: cover;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-flex-container {
            display: flex;
            flex-direction: row; 
            align-items: flex-start; 
            gap: 40px;
            max-width: 1400px; 
            width: 100%;
            justify-content: center; 
        }

        /* Lado Izquierdo: Calculadora */
        .card-container {
            flex: 0 0 380px;
            z-index: 1;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px; border-radius: 40px;
            box-shadow: 0 20px 100px rgba(0,0,0,0.8);
            text-align: center;
        }

        /* Lado Derecho: Banner Binance */
        .binance-container {
            flex: 1; 
            display: flex;
            justify-content: flex-start;
            margin-top: 15px;
        }

        .binance-anchor {
            display: inline-block;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 28px;
            overflow: hidden;
            
            /* Borde 7px (un tercio menos que 10px) */
            border: 7px solid var(--neon-electric-blue);
            
            /* Resplandor Azul Eléctrico */
            box-shadow: 
                0 0 15px rgba(0, 85, 255, 0.6),
                0 0 30px rgba(0, 85, 255, 0.3);
            
            /* Ajuste de altura para asegurar visibilidad */
            min-height: 180px;
            width: auto;
            max-width: 100%;
            background: #000; /* Fondo negro por si la imagen tarda en cargar */
        }

        .binance-anchor:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0 0 30px rgba(0, 85, 255, 0.8), 0 0 50px rgba(0, 85, 255, 0.5);
        }

        .binance-img {
            height: 180px; /* Forzamos la altura para que coincida con el anchor */
            width: auto;
            display: block;
            object-fit: contain;
        }

        /* Estilos internos de la calculadora */
        .brand-header { margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 15px; }
        .logo-img { width: 130px; height: auto; border-radius: 20px; box-shadow: 0 0 20px rgba(255, 102, 0, 0.2); margin-bottom: 10px; }
        .brand-name { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; background: linear-gradient(to right, var(--temu-orange), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .ticker { font-size: 1.1rem; color: var(--gold); font-weight: 800; margin-bottom: 25px; }

        input {
            width: 100%; background: rgba(0,0,0,0.5); border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 18px; color: white; font-size: 1.7rem; border-radius: 20px; text-align: center; box-sizing: border-box;
        }

        .btn-reveal {
            background: linear-gradient(45deg, var(--temu-orange), #ff9000);
            color: white; border: none; padding: 18px 45px; font-size: 1.1rem; font-weight: 900;
            border-radius: 50px; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 30px rgba(255, 102, 0, 0.3);
        }

        #result-wrapper { display: none; margin-top: 20px; }
        .res-value { font-size: 3.2rem; font-weight: 900; }
        
        .temu-box {
            background: linear-gradient(135deg, #ff6600 0%, #ff4400 100%);
            border-radius: 25px; padding: 20px; margin-top: 25px; color: white; text-decoration: none; display: block;
        }
        .coupon-code { background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 8px; font-family: monospace; border: 1px dashed white; display: inline-block; }

        @media (max-width: 1000px) {
            .main-flex-container { flex-direction: column; align-items: center; }
            .binance-anchor { height: auto; width: 100%; max-width: 380px; }
            .binance-img { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <div class="main-flex-container">
        <div class="card-container">
            <div class="card">
                <div class="brand-header">
                    <img src="logo1.jpg" alt="Adictos Logo" class="logo-img">
                    <h2 class="brand-name">ADICTOS.SHOP</h2>
                </div>
                <div id="price" class="ticker">CONECTANDO...</div>
                <input type="number" id="btc" placeholder="0.00 BTC" step="any">
                <div class="action-zone">
                    <button id="go" class="btn-reveal" onclick="calculate()">REVELAR FORTUNA</button>
                    <div id="result-wrapper">
                        <div style="font-size: 0.7rem; color: var(--neon-electric-blue); letter-spacing: 2px; font-weight: 800;">SALDO ESTIMADO</div>
                        <div id="total" class="res-value">0,00 €</div>
                        <a href="https://temu.to/k/e0tl61vc72u" class="temu-box" target="_blank">
                            <div style="font-weight: 800;">🎁 CANJEAR EN TEMU</div>
                            <div class="coupon-code">alh129997</div>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="binance-container">
            <a href="https://www.binance.com/activity/referral-entry/CPA?ref=CPA_00D3WIQWMG" class="binance-anchor" target="_blank" rel="nofollow noopener">
                <img src="bannerBinanceHorizontal.png" alt="Binance Promo" class="binance-img">
            </a>
        </div>
    </div>

<script>
    let btcPrice = 0;
    async function updatePrice() {
        try {
            const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCEUR');
            const d = await r.json();
            btcPrice = parseFloat(d.price);
            document.getElementById('price').innerText = `1 BTC = ${btcPrice.toLocaleString('es-ES')} €`;
        } catch(e) { document.getElementById('price').innerText = "ERROR DE CONEXIÓN"; }
    }
    function calculate() {
        const val = document.getElementById('btc').value;
        if (!val || btcPrice === 0) return;
        document.getElementById('go').style.display = 'none';
        document.getElementById('result-wrapper').style.display = 'block';
        document.getElementById('total').innerText = (val * btcPrice).toLocaleString('es-ES', { minimumFractionDigits: 2 }) + ' €';
    }
    window.onload = updatePrice;
</script>
</body>
</html>
