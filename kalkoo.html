<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Gold Standard</title>
    <style>
        :root {
            --bg: #050508;
            --gold: #ffcc00; /* Oro brillante */
            --cyan: #00f2ff;
            --hot-pink: #ff007a;
            --glass: rgba(15, 15, 25, 0.7);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 0, 122, 0.1) 0%, transparent 70%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* EL FOCO DE ATENCIÓN CENTRAL */
        .spotlight {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 204, 0, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(60px);
            animation: breathe 4s infinite alternate;
        }

        @keyframes breathe { from { opacity: 0.4; transform: scale(1); } to { opacity: 0.8; transform: scale(1.2); } }

        .card {
            position: relative;
            z-index: 1;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 35px;
            box-shadow: 0 0 80px rgba(0,0,0,0.8);
            width: 360px;
            text-align: center;
        }

        h1 {
            font-size: 1rem;
            letter-spacing: 4px;
            color: #aaa;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .ticker {
            font-size: 1.1rem;
            color: var(--gold);
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .input-container { margin-bottom: 25px; }

        input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            color: white;
            font-size: 1.6rem;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.2);
            outline: none;
            transform: scale(1.02);
        }

        .action-zone { height: 160px; display: flex; align-items: center; justify-content: center; margin-top: 10px; }

        .btn-reveal {
            background: white;
            color: black;
            border: none;
            padding: 16px 45px;
            font-size: 1rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
        }

        .btn-reveal:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255,255,255,0.4); }

        /* Loader de suspense circular */
        .loader-ring { position: relative; width: 100px; height: 100px; display: none; }
        .loader-svg { transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 8; }
        .circle-proc { 
            fill: none; stroke: var(--gold); stroke-width: 8; 
            stroke-dasharray: 283; stroke-dashoffset: 283;
            stroke-linecap: round;
            transition: stroke-dashoffset 2.5s ease-in-out;
        }

        /* El Gran Resultado */
        .result-box { display: none; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        .res-label { font-size: 0.7rem; color: #777; letter-spacing: 2px; margin-bottom: 5px; }
        .res-value {
            font-size: 3.2rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        .refresh-btn { margin-top: 15px; color: var(--cyan); cursor: pointer; font-size: 0.8rem; opacity: 0.6; }
        .refresh-btn:hover { opacity: 1; }

    </style>
</head>
<body>

    <div class="spotlight"></div>

    <div class="card">
        <h1>Bitcoin Wallet</h1>
        <div id="price" class="ticker">CONECTANDO...</div>

        <div class="input-container">
            <input type="number" id="btc" placeholder="0.00" step="any">
        </div>

        <div class="action-zone">
            <button id="go" class="btn-reveal" onclick="calculate()">REVELAR FORTUNA</button>

            <div id="loading" class="loader-ring">
                <svg class="loader-svg" width="100" height="100">
                    <circle class="circle-bg" cx="50" cy="50" r="45"></circle>
                    <circle id="bar" class="circle-proc" cx="50" cy="50" r="45"></circle>
                </svg>
            </div>

            <div id="result" class="result-box">
                <div class="res-label">TOTAL ESTIMADO</div>
                <div id="total" class="res-value">0,00 €</div>
                <div class="refresh-btn" onclick="reset()">← OTRA CANTIDAD</div>
            </div>
        </div>
    </div>

<script>
    let btcPrice = 0;

    // Carga suave para evitar bloqueos en Debian/Chrome
    window.onload = () => setTimeout(updatePrice, 600);

    async function updatePrice() {
        try {
            const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCEUR');
            const d = await r.json();
            btcPrice = parseFloat(d.price);
            document.getElementById('price').innerText = `${btcPrice.toLocaleString('es-ES')} € / BTC`;
        } catch(e) { document.getElementById('price').innerText = "BINANCE OFFLINE"; }
    }

    function calculate() {
        const val = document.getElementById('btc').value;
        if (!val || btcPrice === 0) return;

        document.getElementById('go').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        setTimeout(() => { document.getElementById('bar').style.strokeDashoffset = '0'; }, 100);

        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            animateValue(val * btcPrice);
        }, 2700);
    }

    function animateValue(end) {
        const obj = document.getElementById('total');
        let start = 0;
        const duration = 1200;
        const startTime = performance.now();

        function step(now) {
            const progress = Math.min(1, (now - startTime) / duration);
            const current = progress * end;
            obj.innerText = current.toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " €";
            if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }

    function reset() {
        document.getElementById('result').style.display = 'none';
        document.getElementById('go').style.display = 'block';
        document.getElementById('btc').value = '';
        document.getElementById('bar').style.strokeDashoffset = '283';
    }

    setInterval(updatePrice, 20000);
</script>

</body>
</html>
