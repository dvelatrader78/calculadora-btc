<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BGD0E50850"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-BGD0E50850');
    </script>

    <link rel="icon" href="https://cryptologos.cc/logos/bitcoin-btc-logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adictos.shop | Binance & NC Wallet Hub</title>
    <style>
        :root {
            --bg: #050509;
            --gold: #ffcc00;
            --neon-electric-blue: #0055ff; 
            --neon-cyan: #00FFFF;
            --neon-purple: #9D00FF;
            --temu-orange: #ff6600;
            --glass: rgba(15, 15, 25, 0.7);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            background-image: url('fondoWebPage.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-flex-container {
            display: flex;
            flex-direction: row; 
            align-items: flex-start; 
            gap: 40px;
            max-width: 1400px; 
            width: 100%;
            justify-content: center; 
        }

        .card-container {
            flex: 0 0 380px;
            z-index: 1;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px; border-radius: 40px;
            box-shadow: 0 20px 100px rgba(0,0,0,0.8);
            text-align: center;
        }

        .banners-column {
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 30px;
            margin-top: 15px;
        }

        .binance-anchor, .nc-banner-link {
            display: block;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 28px;
            overflow: hidden;
            width: 100%;
            height: auto; 
            min-height: 250px;
            background: #000;
        }

        .binance-img, .nc-banner-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            transition: opacity 0.3s ease;
        }

        .binance-anchor {
            border: 7px solid var(--neon-electric-blue);
            box-shadow: 0 0 15px rgba(0, 85, 255, 0.6), 0 0 30px rgba(0, 85, 255, 0.3);
        }

        .binance-anchor:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0 0 30px rgba(0, 85, 255, 0.8), 0 0 50px rgba(0, 85, 255, 0.5);
        }

        .nc-banner-link {
            border: 7px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4), inset 0 0 10px rgba(157, 0, 255, 0.5);
            background-color: #050505;
        }

        .nc-banner-link:hover {
            transform: scale(1.03) translateY(-5px);
            border-color: var(--neon-purple);
            box-shadow: 0 0 30px var(--neon-purple), 0 0 50px var(--neon-cyan);
        }
        
        .nc-banner-link:hover .nc-banner-img {
            opacity: 0.95;
        }

        .brand-header { margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 15px; }
        .logo-img { width: 130px; height: auto; border-radius: 20px; box-shadow: 0 0 20px rgba(255, 102, 0, 0.2); margin-bottom: 10px; }
        .brand-name { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; background: linear-gradient(to right, var(--temu-orange), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .ticker { font-size: 1.1rem; color: var(--gold); font-weight: 800; margin-bottom: 25px; }

        input {
            width: 100%; background: rgba(0,0,0,0.5); border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 18px; color: white; font-size: 1.7rem; border-radius: 20px; text-align: center; box-sizing: border-box;
        }

        .btn-reveal {
            background: linear-gradient(45deg, var(--temu-orange), #ff9000);
            color: white; border: none; padding: 18px 45px; font-size: 1.1rem; font-weight: 900;
            border-radius: 50px; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 30px rgba(255, 102, 0, 0.3);
        }

        #result-wrapper { display: none; margin-top: 20px; }
        .res-value { font-size: 3.2rem; font-weight: 900; }
        
        .temu-box {
            background: linear-gradient(135deg, #ff6600 0%, #ff4400 100%);
            border-radius: 25px; padding: 20px; margin-top: 25px; color: white; text-decoration: none; display: block;
        }
        .coupon-code { background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 8px; font-family: monospace; border: 1px dashed white; display: inline-block; }

        @media (max-width: 1000px) {
            .main-flex-container { flex-direction: column; align-items: center; }
            .banners-column { width: 100%; max-width: 380px; align-items: center; }
            .binance-anchor, .nc-banner-link { height: auto; width: 100%; max-width: 380px; min-height: auto; }
            .binance-img, .nc-banner-img { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <div class="main-flex-container">
        <div class="card-container">
            <div class="card">
                <div class="brand-header">
                    <img src="logo1.jpg" alt="Adictos Logo" class="logo-img">
                    <h2 class="brand-name">ADICTOS.SHOP</h2>
                </div>
                <div id="price" class="ticker">CONECTANDO...</div>
                <input type="number" id="btc" placeholder="0.00 BTC" step="any">
                <div class="action-zone">
                    <button id="go" class="btn-reveal" onclick="calculate()">REVELAR FORTUNA</button>
                    <div id="result-wrapper">
                        <div style="font-size: 0.7rem; color: var(--neon-electric-blue); letter-spacing: 2px; font-weight: 800;">SALDO ESTIMADO</div>
                        <div id="total" class="res-value">0,00 €</div>
                        <a href="https://temu.to/k/e0tl61vc72u" class="temu-box" target="_blank" onclick="gtag('event', 'clic_banner', {'nombre_banner': 'temu_cupon'});">
                            <div style="font-weight: 800;">🎁 CANJEAR EN TEMU</div>
                            <div class="coupon-code">alh129997</div>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="banners-column">
            <a href="https://www.binance.com/activity/referral-entry/CPA?ref=CPA_00D3WIQWMG" class="binance-anchor" target="_blank" rel="nofollow noopener" onclick="gtag('event', 'clic_banner', {'nombre_banner': 'binance_referral'});">
                <img src="bannerBinanceHorizontal.png" alt="Binance Promo" class="binance-img">
            </a>
            
            <a href="https://ncwallet.net/invite-app/A941CYBP?lang=es" target="_blank" rel="noopener noreferrer" class="nc-banner-link" title="Descargar NC Wallet - Sin comisiones" onclick="gtag('event', 'clic_banner', {'nombre_banner': 'nc_wallet_invite'});">
                <img src="bannerNCWallet.png" alt="NC Wallet - La primera wallet con retiradas sin comisiones de red" class="nc-banner-img" loading="lazy">
            </a>
        </div>
    </div>

<script>
    let btcPrice = 0;
    async function updatePrice() {
        try {
            const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCEUR');
            const d = await r.json();
            btcPrice = parseFloat(d.price);
            document.getElementById('price').innerText = `1 BTC = ${btcPrice.toLocaleString('es-ES')} €`;
        } catch(e) { document.getElementById('price').innerText = "ERROR DE CONEXIÓN"; }
    }
    function calculate() {
        const val = document.getElementById('btc').value;
        if (!val || btcPrice === 0) return;
        
        // Registrar evento de uso de la calculadora en Analytics
        gtag('event', 'uso_calculadora', {
            'valor_btc': val
        });

        document.getElementById('go').style.display = 'none';
        document.getElementById('result-wrapper').style.display = 'block';
        document.getElementById('total').innerText = (val * btcPrice).toLocaleString('es-ES', { minimumFractionDigits: 2 }) + ' €';
    }
    window.onload = updatePrice;
</script>
</body>
</html>
