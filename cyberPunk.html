<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Suspense Converter</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111;
            --primary: #00ff41; /* Verde Matrix */
            --primary-dim: #00330d;
            --text: #e0e0e0;
            --shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Fondo de código Matrix sutil */
        body::before {
            content: "101011010010111010101";
            position: absolute;
            font-size: 10px;
            color: rgba(0, 255, 65, 0.03);
            white-space: nowrap;
            top: 0; left: 0;
            animation: matrixRain 20s linear infinite;
            z-index: -1;
        }

        @keyframes matrixRain { from { transform: translateY(-100%); } to { transform: translateY(100%); } }

        .calculator-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--primary-dim);
            box-shadow: var(--shadow);
            width: 350px;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: var(--shadow);
        }

        .ticker {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 25px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; }

        input[type="number"] {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            padding: 12px;
            color: var(--primary);
            font-size: 1.2rem;
            border-radius: 4px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-dim);
        }

        /* Contenedor de la zona de suspense */
        .action-zone {
            position: relative;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        /* Botón inicial */
        .reveal-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }

        .reveal-btn:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 20px var(--primary);
        }

        /* El Círculo de Progreso (Oculto inicialmente) */
        .progress-container {
            position: relative;
            width: 100px;
            height: 100px;
            display: none; /* Se activa con JS */
        }

        .progress-svg {
            transform: rotate(-90deg);
        }

        .progress-circle-bg {
            fill: none;
            stroke: #222;
            stroke-width: 8;
        }

        .progress-circle-bar {
            fill: none;
            stroke: var(--primary);
            stroke-width: 8;
            stroke-dasharray: 283; /* 2 * PI * r (45) */
            stroke-dashoffset: 283; /* Completamente vacía */
            stroke-linecap: round;
            transition: stroke-dashoffset 2.5s linear; /* DURACIÓN DEL SUSPENSE */
        }

        .loading-text {
            position: absolute;
            font-size: 0.7rem;
            color: var(--primary);
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        /* Resultado Final (Oculto inicialmente) */
        .result-display {
            display: none;
            text-align: center;
        }

        .euro-value {
            font-size: 2.2rem;
            color: var(--text);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .reset-link {
            font-size: 0.7rem;
            color: #555;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 10px;
            display: block;
        }

    </style>
</head>
<body>

    <audio id="soundHums" src="https://actions.google.com/sounds/v1/science_fiction/ambience_hum_loop.ogg" preload="auto"></audio>
    <audio id="soundBingo" src="https://actions.google.com/sounds/v1/retro/8_bit_level_up.ogg" preload="auto"></audio>

    <div class="calculator-card">
        <h1>BTC <span style="color:white">>></span> EUR</h1>
        <div class="ticker" id="btcPrice">Conectando a Binance...</div>

        <div class="input-group">
            <label>Cantidad BTC</label>
            <input type="number" id="btcAmount" placeholder="0.00000000" step="any">
        </div>

        <div class="action-zone">
            <button class="reveal-btn" id="revealBtn" onclick="startSuspense()">Revelar Valor</button>

            <div class="progress-container" id="suspenseCircle">
                <svg class="progress-svg" width="100" height="100">
                    <circle class="progress-circle-bg" cx="50" cy="50" r="45"></circle>
                    <circle class="progress-circle-bar" id="progressBar" cx="50" cy="50" r="45"></circle>
                </svg>
                <div class="loading-text">REVELANDO</div>
            </div>

            <div class="result-display" id="resultDisplay">
                <div class="euro-value" id="euroResult">0.00 €</div>
                <span class="reset-link" onclick="resetCalc()">convertir otra cantidad</span>
            </div>
        </div>
    </div>

    <script>
        let currentBtcPrice = 0;
        const s_hum = document.getElementById('soundHums');
        const s_bingo = document.getElementById('soundBingo');

        // 1. Obtener precio real (Binance)
        async function getBinancePrice() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCEUR');
                const data = await response.json();
                currentBtcPrice = parseFloat(data.price);
                document.getElementById('btcPrice').innerText = `1 BTC = ${currentBtcPrice.toLocaleString('es-ES')} €`;
            } catch (error) {
                document.getElementById('btcPrice').innerText = "Error de conexión";
                console.error(error);
            }
        }

        // 2. Lógica del Suspense Adictivo
        function startSuspense() {
            const btcInput = document.getElementById('btcAmount').value;
            if (!btcInput || btcInput <= 0) { alert("Introduce una cantidad válida"); return; }

            // Cambiar estados visuales
            document.getElementById('revealBtn').style.display = 'none';
            document.getElementById('suspenseCircle').style.display = 'flex';
            
            // Sonido de carga (hum)
            s_hum.currentTime = 0;
            s_hum.play();

            // Animar el círculo SVG (dashoffset va de 283 a 0)
            const bar = document.getElementById('progressBar');
            setTimeout(() => {
                bar.style.strokeDashoffset = '0';
            }, 100); // Pequeño delay para que la transición CSS enganche

            // Esperar a que termine la animación del círculo (2.5s)
            setTimeout(() => {
                finishSequence(btcInput);
            }, 2600); // 2.5s de la animación + 100ms de buffer
        }

        // 3. Revelar resultado final
        function finishSequence(btcAmount) {
            s_hum.pause(); // Para el zumbido
            
            // Sonido de éxito
            s_bingo.currentTime = 0;
            s_bingo.play();

            // Ocultar carga, mostrar resultado
            document.getElementById('suspenseCircle').style.display = 'none';
            document.getElementById('resultDisplay').style.display = 'block';

            // Calcular y animar el número final
            const finalEur = btcAmount * currentBtcPrice;
            animateNumber('euroResult', finalEur);
        }

        // Auxiliar: Animación rápida del número final (contador)
        function animateNumber(id, targetValue) {
            const obj = document.getElementById(id);
            let current = 0;
            const duration = 800; // milisegundos
            const start = performance.now();

            function step(now) {
                const progress = Math.min(1, (now - start) / duration);
                const easedProgress = 1 - Math.pow(1 - progress, 3); // easeOutCubic
                current = easedProgress * targetValue;
                
                obj.innerText = current.toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " €";
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            }
            window.requestAnimationFrame(step);
        }

        // Resetear
        function resetCalc() {
            document.getElementById('resultDisplay').style.display = 'none';
            document.getElementById('revealBtn').style.display = 'inline-block';
            document.getElementById('btcAmount').value = '';
            document.getElementById('progressBar').style.strokeDashoffset = '283'; // Resetear barra
        }

        // Inicio
        getBinancePrice();
        // Actualizar precio cada 30s de fondo
        setInterval(getBinancePrice, 30000);

    </script>
</body>
</html>
